# DRS GitLab CI Template
# Include this in your .gitlab-ci.yml:
#
# include:
#   - remote: 'https://raw.githubusercontent.com/manojlds/drs/main/src/ci/gitlab-ci.template.yml'

# Base template for Pi-based DRS reviews
.drs_review:
  image: node:20-alpine
  only:
    - merge_requests
  script:
    - npm install -g @diff-review-system/drs
    - drs workflow run gitlab-mr-review-post --input project=$CI_PROJECT_ID --input mr=$CI_MERGE_REQUEST_IID
  variables:
    # GitLab Token (use CI_JOB_TOKEN for automatic auth)
    GITLAB_TOKEN: "${CI_JOB_TOKEN}"

    # GitLab URL (optional, defaults to https://gitlab.com)
    GITLAB_URL: "${CI_SERVER_URL}"

    # Anthropic API Key (required for AI reviews)
    # Set this as a CI/CD variable in GitLab: Settings → CI/CD → Variables
    ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"

    # DRS uses in-process Pi runtime (no remote runtime endpoint needed)

    # Review agents to use (optional, defaults to review/unified-reviewer)
    # REVIEW_AGENTS: "review/unified-reviewer,review/my-project-reviewer"

  # Allow job to fail without blocking pipeline
  allow_failure: true

  # Artifacts (optional - save review results)
  # artifacts:
  #   reports:
  #     codequality: gl-code-quality-report.json
  #   when: always
  #   expire_in: 1 week

# Full review (runs in review stage)
ai_review_full:
  extends: .drs_review
  stage: review

# Strict review (can block pipeline if issues found)
ai_review_strict:
  extends: .drs_review
  stage: review
  allow_failure: false  # Block on critical/high issues
