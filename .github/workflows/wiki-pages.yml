name: Publish Repository Wiki

on:
  push:
    branches:
      - main
    paths:
      - '.drs/wiki-state.json'
      - '.github/workflows/wiki-pages.yml'
      - '.wiki-site/**'
      - 'package-lock.json'
      - 'package.json'
      - 'src/lib/okf-wiki.ts'
      - 'src/lib/wiki-delta.ts'
      - 'wiki/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22.19.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build DRS
        run: npm run build

      - name: Check repository wiki delta
        run: node dist/cli/index.js workflow run repository-wiki-check --executor local --json

      - name: Build repository wiki site
        env:
          WIKI_SITE_BASE: /${{ github.event.repository.name }}/
          WIKI_SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: npm run wiki:site:build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload repository wiki site
        uses: actions/upload-pages-artifact@v5
        with:
          path: .wiki-site/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy repository wiki site
        id: deployment
        uses: actions/deploy-pages@v5
