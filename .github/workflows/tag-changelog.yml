name: Update changelog from tag

on:
  push:
    tags:
      - "v*-rc.*"

permissions:
  contents: write

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout default branch with tags
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22.19.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build DRS
        run: npm run build

      - name: Update changelog from tag range
        run: node dist/cli/index.js workflow run tag-changelog-update
        env:
          DRS_DEFAULT_MODEL: opencode-go/kimi-k2.7-code
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}

      - name: Commit changelog update
        run: |
          if git diff --quiet -- CHANGELOG.md; then
            echo "No changelog update needed"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs: update changelog for $GITHUB_REF_NAME"
          git push origin HEAD:${{ github.event.repository.default_branch }}
