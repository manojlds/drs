name: DRS PR Review

on:
  pull_request_target:
    types: [opened, synchronize, reopened, labeled]

concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # First, verify if the contributor is trusted
  verify-contributor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      is-trusted: ${{ steps.check.outputs.is-trusted }}
      has-review-label: ${{ steps.check.outputs.has-review-label }}
    steps:
      - name: Check contributor status
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if PR author is a repository member or collaborator
          AUTHOR="${{ github.event.pull_request.user.login }}"
          REPO="${{ github.repository }}"

          echo "Checking if $AUTHOR is a trusted contributor..."

          # Check organization membership or repository collaborator status
          if gh api "/repos/$REPO/collaborators/$AUTHOR" --silent 2>/dev/null; then
            echo "✅ $AUTHOR is a repository collaborator"
            echo "is-trusted=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️  $AUTHOR is an external contributor"
            echo "is-trusted=false" >> $GITHUB_OUTPUT
          fi

          # Check if PR has the safe-to-review label
          LABELS='${{ toJSON(github.event.pull_request.labels.*.name) }}'
          if echo "$LABELS" | grep -q "safe-to-review"; then
            echo "✅ PR has 'safe-to-review' label"
            echo "has-review-label=true" >> $GITHUB_OUTPUT
          else
            echo "has-review-label=false" >> $GITHUB_OUTPUT
          fi

  # Auto-review for trusted contributors (repository members/collaborators)
  review-trusted:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: verify-contributor
    if: needs.verify-contributor.outputs.is-trusted == 'true'
    outputs:
      reviewed-head: ${{ steps.reviewed-head.outputs.sha }}
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Fetch base branch for git diff
        run: |
          # Fetch the base branch to make origin/<base> available for git diff
          git fetch origin ${{ github.event.pull_request.base.ref }}:refs/remotes/origin/${{ github.event.pull_request.base.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22.19.0'

      - name: Install dependencies
        run: npm ci

      - name: Build DRS
        run: npm run build

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Resolve model provider key
        env:
          DRS_PROVIDER_API_KEY: ${{ secrets.DRS_PROVIDER_API_KEY }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          # Prefer DRS_PROVIDER_API_KEY; fall back to legacy OPENCODE_API_KEY
          RESOLVED_KEY="${DRS_PROVIDER_API_KEY:-$OPENCODE_API_KEY}"

          if [ -z "$RESOLVED_KEY" ]; then
            echo "❌ Missing model provider key. Configure DRS_PROVIDER_API_KEY in repository secrets."
            exit 1
          fi

          # Expose under the name the custom provider config expects
          echo "OPENCODE_API_KEY=$RESOLVED_KEY" >> "$GITHUB_ENV"
          echo "✅ Model provider key resolved"

      - name: Review Pull Request (Trusted Contributor)
        env:
          DRS_RUNTIME_OPERATION_TIMEOUT_MS: "300000"
          DRS_RUNTIME_STREAM_TIMEOUT_MS: "900000"
          DRS_RUNTIME_STREAM_POLL_INTERVAL_MS: "2000"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ""
          OPENAI_API_KEY: ""
          ZHIPU_API_KEY: ""
        run: |
          echo "🚀 Starting PR review for trusted contributor..."
          echo "👤 Author: ${{ github.event.pull_request.user.login }} (trusted)"
          if [ -z "$OPENCODE_API_KEY" ]; then
            echo "❌ Provider API key is not available in this step"
            exit 1
          fi

          node dist/cli/index.js workflow run github-pr-review \
            --input owner="${{ github.event.repository.owner.login }}" \
            --input repo="${{ github.event.repository.name }}" \
            --input pr="${{ github.event.pull_request.number }}" \
            --input describe=false \
            --input post=true \
            --input visual=false \
            --input fix=true \
            --input fixMode=internal \
            --input fixSeverity=medium \
            --input fixMaxIterations=1 \
            --input visualOutputPath=".drs/visual-pr-explainer.html" \
            --trace

      - name: Record reviewed head
        id: reviewed-head
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Upload visual explainer artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-pr-explainer-trusted
          path: .drs/visual-pr-explainer.html
          if-no-files-found: ignore

      - name: Upload DRS workflow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drs-workflow-artifacts-trusted
          path: .drs/artifacts/**
          if-no-files-found: ignore

      - name: Upload trace viewer
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trace-viewer-trusted
          path: .drs/artifacts/**/trace.html
          if-no-files-found: ignore

  sync-wiki-trusted:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - verify-contributor
      - review-trusted
    if: >-
      needs.verify-contributor.outputs.is-trusted == 'true' &&
      needs.review-trusted.result == 'success' &&
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
    outputs:
      baseline-sha: ${{ steps.baseline.outputs.sha }}
      changed: ${{ steps.wiki-changes.outputs.changed }}

    steps:
      - name: Checkout current PR branch
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.review-trusted.outputs.reviewed-head }}
          fetch-depth: 0
          persist-credentials: false

      - name: Record checked-out head
        id: baseline
        env:
          EXPECTED_SHA: ${{ needs.review-trusted.outputs.reviewed-head }}
        run: |
          actual_sha="$(git rev-parse HEAD)"
          if [ "$actual_sha" != "$EXPECTED_SHA" ]; then
            echo "Expected reviewed head $EXPECTED_SHA but checked out $actual_sha"
            exit 1
          fi
          echo "sha=$actual_sha" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22.19.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build DRS
        run: npm run build

      - name: Synchronize repository wiki
        env:
          DRS_PROVIDER_API_KEY: ${{ secrets.DRS_PROVIDER_API_KEY }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          DRS_RUNTIME_OPERATION_TIMEOUT_MS: '300000'
          DRS_RUNTIME_STREAM_TIMEOUT_MS: '900000'
          DRS_RUNTIME_STREAM_POLL_INTERVAL_MS: '2000'
        run: |
          resolved_key="${DRS_PROVIDER_API_KEY:-$OPENCODE_API_KEY}"
          if [ -z "$resolved_key" ]; then
            echo "Missing DRS_PROVIDER_API_KEY or OPENCODE_API_KEY"
            exit 1
          fi

          export OPENCODE_API_KEY="$resolved_key"
          node dist/cli/index.js workflow run repository-wiki-sync \
            --executor local \
            --json

      - name: Guard and stage wiki-only changes
        id: wiki-changes
        shell: bash
        run: |
          set -euo pipefail
          unexpected=false

          while IFS= read -r -d '' path; do
            case "$path" in
              wiki/*|.drs/wiki-state.json) ;;
              *)
                printf 'Unexpected modified path: %q\n' "$path"
                unexpected=true
                ;;
            esac
          done < <(git diff --name-only --no-renames -z HEAD)

          while IFS= read -r -d '' path; do
            case "$path" in
              wiki/*|.drs/wiki-state.json) ;;
              *)
                printf 'Unexpected untracked path: %q\n' "$path"
                unexpected=true
                ;;
            esac
          done < <(git ls-files --others --exclude-standard -z)

          if [ "$unexpected" = true ]; then
            exit 1
          fi

          git add -A -- wiki .drs/wiki-state.json
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Repository wiki is already current"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --cached --stat
            git diff --cached --binary --full-index > .drs/wiki-sync.patch
          fi

      - name: Upload repository wiki patch
        if: steps.wiki-changes.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: repository-wiki-patch-${{ github.run_id }}-${{ github.run_attempt }}
          path: .drs/wiki-sync.patch
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 1

  commit-wiki-trusted:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - verify-contributor
      - sync-wiki-trusted
    if: >-
      needs.verify-contributor.outputs.is-trusted == 'true' &&
      needs.sync-wiki-trusted.result == 'success' &&
      needs.sync-wiki-trusted.outputs.changed == 'true' &&
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read

    steps:
      - name: Checkout reviewed PR head
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.sync-wiki-trusted.outputs.baseline-sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Download repository wiki patch
        uses: actions/download-artifact@v4
        with:
          name: repository-wiki-patch-${{ github.run_id }}-${{ github.run_attempt }}
          path: /tmp/drs-wiki-sync

      - name: Apply and verify repository wiki patch
        shell: bash
        env:
          BASELINE_SHA: ${{ needs.sync-wiki-trusted.outputs.baseline-sha }}
        run: |
          set -euo pipefail
          if [ "$(git rev-parse HEAD)" != "$BASELINE_SHA" ]; then
            echo "Repository wiki patch checkout does not match the reviewed head"
            exit 1
          fi

          git apply --index --binary /tmp/drs-wiki-sync/wiki-sync.patch
          unexpected=false
          while IFS= read -r -d '' path; do
            case "$path" in
              wiki/*|.drs/wiki-state.json) ;;
              *)
                printf 'Unexpected patched path: %q\n' "$path"
                unexpected=true
                ;;
            esac
          done < <(git diff --cached --name-only --no-renames -z)

          while IFS= read -r -d '' entry; do
            case "$entry" in
              120000\ *)
                printf 'Symbolic links are not allowed in the repository wiki patch: %q\n' "$entry"
                unexpected=true
                ;;
            esac
          done < <(git ls-files --stage -z -- wiki .drs/wiki-state.json)

          if [ "$unexpected" = true ] || git diff --cached --quiet; then
            exit 1
          fi

          git diff --cached --check

      - name: Commit and push repository wiki
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.DRS_WIKI_SYNC_TOKEN }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          BASELINE_SHA: ${{ needs.sync-wiki-trusted.outputs.baseline-sha }}
          AUTHOR_LOGIN: ${{ github.event.pull_request.user.login }}
          AUTHOR_ID: ${{ github.event.pull_request.user.id }}
        run: |
          set -euo pipefail
          if [ -z "$GH_TOKEN" ]; then
            echo "Missing DRS_WIKI_SYNC_TOKEN with repository Contents read/write access"
            exit 1
          fi

          gh auth setup-git
          remote_line="$(git ls-remote origin "refs/heads/$HEAD_REF")"
          remote_sha="${remote_line%%$'\t'*}"
          if [ "$remote_sha" != "$BASELINE_SHA" ]; then
            echo "PR branch moved while wiki synchronization was running"
            echo "Expected: $BASELINE_SHA"
            echo "Remote:   ${remote_sha:-<missing>}"
            exit 1
          fi

          author_email="${AUTHOR_ID}+${AUTHOR_LOGIN}@users.noreply.github.com"
          export GIT_AUTHOR_NAME="$AUTHOR_LOGIN"
          export GIT_AUTHOR_EMAIL="$author_email"
          export GIT_COMMITTER_NAME="$AUTHOR_LOGIN"
          export GIT_COMMITTER_EMAIL="$author_email"
          git commit -m "docs(wiki): synchronize repository wiki"
          git push \
            --force-with-lease="refs/heads/$HEAD_REF:$BASELINE_SHA" \
            origin \
            "HEAD:refs/heads/$HEAD_REF"

  # Review for external contributors - requires environment approval OR safe-to-review label
  review-external:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: verify-contributor
    if: |
      needs.verify-contributor.outputs.is-trusted == 'false' &&
      needs.verify-contributor.outputs.has-review-label == 'true'
    # Use protected environment for manual approval gate
    # Repository admins must configure this environment in Settings > Environments
    environment: external-pr-review
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Fetch base branch for git diff
        run: |
          # Fetch the base branch to make origin/<base> available for git diff
          git fetch origin ${{ github.event.pull_request.base.ref }}:refs/remotes/origin/${{ github.event.pull_request.base.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22.19.0'

      - name: Install dependencies
        run: npm ci

      - name: Build DRS
        run: npm run build

      - name: Resolve model provider key
        env:
          DRS_PROVIDER_API_KEY: ${{ secrets.DRS_PROVIDER_API_KEY }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          # Prefer DRS_PROVIDER_API_KEY; fall back to legacy OPENCODE_API_KEY
          RESOLVED_KEY="${DRS_PROVIDER_API_KEY:-$OPENCODE_API_KEY}"

          if [ -z "$RESOLVED_KEY" ]; then
            echo "❌ Missing model provider key. Configure DRS_PROVIDER_API_KEY in repository secrets."
            exit 1
          fi

          # Expose under the name the custom provider config expects
          echo "OPENCODE_API_KEY=$RESOLVED_KEY" >> "$GITHUB_ENV"
          echo "✅ Model provider key resolved"

      - name: Review Pull Request (External Contributor)
        env:
          DRS_RUNTIME_OPERATION_TIMEOUT_MS: "300000"
          DRS_RUNTIME_STREAM_TIMEOUT_MS: "900000"
          DRS_RUNTIME_STREAM_POLL_INTERVAL_MS: "2000"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ""
          OPENAI_API_KEY: ""
          ZHIPU_API_KEY: ""
        run: |
          echo "🚀 Starting PR review for external contributor..."
          echo "👤 Author: ${{ github.event.pull_request.user.login }} (external - approved)"
          if [ -z "$OPENCODE_API_KEY" ]; then
            echo "❌ Provider API key is not available in this step"
            exit 1
          fi

          node dist/cli/index.js workflow run github-pr-review \
            --input owner="${{ github.event.repository.owner.login }}" \
            --input repo="${{ github.event.repository.name }}" \
            --input pr="${{ github.event.pull_request.number }}" \
            --input describe=true \
            --input post=true \
            --input visual=true \
            --input fix=false \
            --input visualOutputPath=".drs/visual-pr-explainer.html" \
            --trace

      - name: Upload visual explainer artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-pr-explainer-external
          path: .drs/visual-pr-explainer.html
          if-no-files-found: ignore

      - name: Upload DRS workflow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drs-workflow-artifacts-external
          path: .drs/artifacts/**
          if-no-files-found: ignore

      - name: Upload trace viewer
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trace-viewer-external
          path: .drs/artifacts/**/trace.html
          if-no-files-found: ignore

  # Notify when external PR is waiting for approval
  notify-external:
    runs-on: ubuntu-latest
    needs: verify-contributor
    if: |
      needs.verify-contributor.outputs.is-trusted == 'false' &&
      needs.verify-contributor.outputs.has-review-label == 'false'
    permissions:
      pull-requests: write

    steps:
      - name: Post notification comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body "👋 Thanks for your contribution!

          Since this is from an external contributor, automated review requires approval from a repository maintainer.

          **Maintainers:** To trigger the automated review, either:
          1. Add the \`safe-to-review\` label to this PR
          2. Approve the workflow run in the Actions tab

          This helps prevent abuse and protects API costs. Thank you for understanding! 🙏"
