name: DRS PR Review

on:
  pull_request_target:
    types: [opened, synchronize, reopened, labeled]

concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  # First, verify if the contributor is trusted
  verify-contributor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      is-trusted: ${{ steps.check.outputs.is-trusted }}
      has-review-label: ${{ steps.check.outputs.has-review-label }}
    steps:
      - name: Check contributor status
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          BASE_REPOSITORY: ${{ github.repository }}
          HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          PR_LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          echo "Checking whether $PR_AUTHOR can use the trusted review path..."

          permission="$(gh api "/repos/$BASE_REPOSITORY/collaborators/$PR_AUTHOR/permission" --jq '.permission' 2>/dev/null || true)"
          if [ "$HEAD_REPOSITORY" = "$BASE_REPOSITORY" ] && [[ "$permission" =~ ^(admin|maintain|write)$ ]]; then
            echo "$PR_AUTHOR has $permission access on a same-repository branch"
            echo "is-trusted=true" >> $GITHUB_OUTPUT
          else
            echo "$PR_AUTHOR must use the external review path"
            echo "is-trusted=false" >> $GITHUB_OUTPUT
          fi

          if jq -e 'index("safe-to-review") != null' <<<"$PR_LABELS" >/dev/null; then
            echo "PR has the safe-to-review label"
            echo "has-review-label=true" >> $GITHUB_OUTPUT
          else
            echo "has-review-label=false" >> $GITHUB_OUTPUT
          fi

  # Auto-review for trusted contributors (repository members/collaborators)
  review-trusted:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: verify-contributor
    if: needs.verify-contributor.outputs.is-trusted == 'true'
    outputs:
      reviewed-head: ${{ steps.reviewed-head.outputs.sha }}
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Fetch base branch for git diff
        run: |
          # Fetch the base branch to make origin/<base> available for git diff
          git fetch origin ${{ github.event.pull_request.base.ref }}:refs/remotes/origin/${{ github.event.pull_request.base.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22.19.0'

      - name: Install dependencies
        run: npm ci

      - name: Build DRS
        run: npm run build

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Select internal fix mode
        id: internal-fix
        run: |
          if [ "$(git log -1 --pretty=%s)" = 'chore: refresh checks after DRS fixes' ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve model provider key
        env:
          DRS_PROVIDER_API_KEY: ${{ secrets.DRS_PROVIDER_API_KEY }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          # Prefer DRS_PROVIDER_API_KEY; fall back to legacy OPENCODE_API_KEY
          RESOLVED_KEY="${DRS_PROVIDER_API_KEY:-$OPENCODE_API_KEY}"

          if [ -z "$RESOLVED_KEY" ]; then
            echo "❌ Missing model provider key. Configure DRS_PROVIDER_API_KEY in repository secrets."
            exit 1
          fi

          # Expose under the name the custom provider config expects
          echo "OPENCODE_API_KEY=$RESOLVED_KEY" >> "$GITHUB_ENV"
          echo "✅ Model provider key resolved"

      - name: Review Pull Request (Trusted Contributor)
        env:
          DRS_RUNTIME_OPERATION_TIMEOUT_MS: "300000"
          DRS_RUNTIME_STREAM_TIMEOUT_MS: "900000"
          DRS_RUNTIME_STREAM_POLL_INTERVAL_MS: "2000"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ""
          OPENAI_API_KEY: ""
          ZHIPU_API_KEY: ""
        run: |
          echo "🚀 Starting PR review for trusted contributor..."
          echo "👤 Author: ${{ github.event.pull_request.user.login }} (trusted)"
          if [ -z "$OPENCODE_API_KEY" ]; then
            echo "❌ Provider API key is not available in this step"
            exit 1
          fi

          node dist/cli/index.js workflow run github-pr-review \
            --input owner="${{ github.event.repository.owner.login }}" \
            --input repo="${{ github.event.repository.name }}" \
            --input pr="${{ github.event.pull_request.number }}" \
            --input describe=false \
            --input post=true \
            --input visual=false \
            --input fix="${{ steps.internal-fix.outputs.enabled }}" \
            --input fixMode=internal \
            --input fixSeverity=medium \
            --input fixMaxIterations=1 \
            --input visualOutputPath=".drs/visual-pr-explainer.html" \
            --trace

      - name: Record reviewed head
        id: reviewed-head
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Upload visual explainer artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-pr-explainer-trusted
          path: .drs/visual-pr-explainer.html
          if-no-files-found: ignore

      - name: Upload DRS workflow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drs-workflow-artifacts-trusted
          path: .drs/artifacts/**
          if-no-files-found: ignore

      - name: Upload trace viewer
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trace-viewer-trusted
          path: .drs/artifacts/**/trace.html
          if-no-files-found: ignore

  refresh-trusted-checks:
    runs-on: ubuntu-latest
    needs:
      - verify-contributor
      - review-trusted
    if: >-
      needs.verify-contributor.outputs.is-trusted == 'true' &&
      needs.review-trusted.result == 'success' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      needs.review-trusted.outputs.reviewed-head != github.event.pull_request.head.sha
    permissions:
      contents: read

    steps:
      - name: Push check-refresh commit after internal fixes
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.DRS_WIKI_SYNC_TOKEN }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          REVIEWED_HEAD: ${{ needs.review-trusted.outputs.reviewed-head }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "Missing DRS_WIKI_SYNC_TOKEN with repository Contents write access"
            exit 1
          fi

          encoded_ref="$(jq -rn --arg value "$HEAD_REF" '$value | @uri')"
          remote_head="$(gh api "repos/$GH_REPO/git/ref/heads/$encoded_ref" --jq '.object.sha')"
          if [ "$remote_head" != "$REVIEWED_HEAD" ]; then
            echo "PR branch moved after DRS review fixes"
            echo "Expected: $REVIEWED_HEAD"
            echo "Remote:   $remote_head"
            exit 1
          fi

          tree_sha="$(gh api "repos/$GH_REPO/git/commits/$REVIEWED_HEAD" --jq '.tree.sha')"
          refresh_sha="$(gh api --method POST "repos/$GH_REPO/git/commits" \
            -f message='chore: refresh checks after DRS fixes' \
            -f tree="$tree_sha" \
            -f "parents[]=$REVIEWED_HEAD" \
            --jq '.sha')"
          gh api --method PATCH "repos/$GH_REPO/git/refs/heads/$encoded_ref" \
            -f sha="$refresh_sha" \
            -F force=false \
            --silent

  # Generate an external review from trusted base code with read-only credentials.
  review-external:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: verify-contributor
    if: |
      needs.verify-contributor.outputs.is-trusted == 'false' &&
      needs.verify-contributor.outputs.has-review-label == 'true'
    # Configure required reviewers for this environment in repository settings.
    environment: external-pr-review
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout trusted base code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22.19.0'

      - name: Install dependencies
        run: npm ci

      - name: Build DRS
        run: npm run build

      - name: Resolve model provider key
        env:
          DRS_PROVIDER_API_KEY: ${{ secrets.DRS_PROVIDER_API_KEY }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          # Prefer DRS_PROVIDER_API_KEY; fall back to legacy OPENCODE_API_KEY
          RESOLVED_KEY="${DRS_PROVIDER_API_KEY:-$OPENCODE_API_KEY}"

          if [ -z "$RESOLVED_KEY" ]; then
            echo "❌ Missing model provider key. Configure DRS_PROVIDER_API_KEY in repository secrets."
            exit 1
          fi

          # Expose under the name the custom provider config expects
          echo "OPENCODE_API_KEY=$RESOLVED_KEY" >> "$GITHUB_ENV"
          echo "✅ Model provider key resolved"

      - name: Review Pull Request (External Contributor)
        env:
          DRS_RUNTIME_OPERATION_TIMEOUT_MS: "300000"
          DRS_RUNTIME_STREAM_TIMEOUT_MS: "900000"
          DRS_RUNTIME_STREAM_POLL_INTERVAL_MS: "2000"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ""
          OPENAI_API_KEY: ""
          ZHIPU_API_KEY: ""
        run: |
          echo "🚀 Starting PR review for external contributor..."
          echo "👤 Author: ${{ github.event.pull_request.user.login }} (external - approved)"
          if [ -z "$OPENCODE_API_KEY" ]; then
            echo "❌ Provider API key is not available in this step"
            exit 1
          fi

          node dist/cli/index.js workflow run github-pr-review \
            --input owner="${{ github.event.repository.owner.login }}" \
            --input repo="${{ github.event.repository.name }}" \
            --input pr="${{ github.event.pull_request.number }}" \
            --input describe=false \
            --input post=false \
            --input visual=false \
            --input requireCompleteDiff=true \
            --input fix=false

      - name: Resolve canonical review artifact path
        id: review-artifact
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          project_slug="${GITHUB_REPOSITORY//\//-}"
          echo "path=.drs/artifacts/github/$project_slug/pr-$PR_NUMBER/review/latest.json" >> "$GITHUB_OUTPUT"

      - name: Upload canonical review artifact
        uses: actions/upload-artifact@v4
        with:
          name: drs-external-review-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
          path: ${{ steps.review-artifact.outputs.path }}
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 1

  # Consume only the validated artifact; no model provider secret enters this job.
  post-external-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: review-external
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout trusted base code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22.19.0'

      - name: Install dependencies
        run: npm ci

      - name: Build DRS
        run: npm run build

      - name: Prepare canonical review artifact directory
        id: review-artifact
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          project_slug="${GITHUB_REPOSITORY//\//-}"
          artifact_directory=".drs/artifacts/github/$project_slug/pr-$PR_NUMBER/review"
          mkdir -p "$artifact_directory"
          echo "directory=$artifact_directory" >> "$GITHUB_OUTPUT"

      - name: Download canonical review artifact
        uses: actions/download-artifact@v5
        with:
          name: drs-external-review-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
          path: ${{ steps.review-artifact.outputs.directory }}

      - name: Validate and post external review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ""
          OPENAI_API_KEY: ""
          OPENCODE_API_KEY: ""
          ZHIPU_API_KEY: ""
        run: |
          node dist/cli/index.js workflow run github-pr-review-post \
            --input owner="${{ github.event.repository.owner.login }}" \
            --input repo="${{ github.event.repository.name }}" \
            --input pr="${{ github.event.pull_request.number }}" \
            --input expectedHeadSha="${{ github.event.pull_request.head.sha }}"

  # Notify when external PR is waiting for approval
  notify-external:
    runs-on: ubuntu-latest
    needs: verify-contributor
    if: |
      needs.verify-contributor.outputs.is-trusted == 'false' &&
      needs.verify-contributor.outputs.has-review-label == 'false'
    permissions:
      pull-requests: write

    steps:
      - name: Post notification comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body "👋 Thanks for your contribution!

          Since this change uses the external review path, automated review requires approval from a repository maintainer.

          **Maintainers:** Add the \`safe-to-review\` label to trigger review. If the \`external-pr-review\` environment is protected, also approve the queued job in the Actions tab.

          This helps prevent abuse and protects API costs. Thank you for understanding! 🙏"
