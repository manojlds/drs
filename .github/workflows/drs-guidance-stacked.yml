name: DRS Stacked Guidance Update

on:
  workflow_dispatch:
    inputs:
      pr:
        description: Source pull request number
        required: true
      paths:
        description: Guidance paths to consider
        required: false
        default: AGENTS.md,CLAUDE.md,.github/copilot-instructions.md

permissions:
  contents: write
  pull-requests: write

jobs:
  guidance:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout source PR head
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr checkout "${{ inputs.pr }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.19.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build DRS
        run: npm run build

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Resolve model provider key
        env:
          DRS_PROVIDER_API_KEY: ${{ secrets.DRS_PROVIDER_API_KEY }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          RESOLVED_KEY="${DRS_PROVIDER_API_KEY:-$OPENCODE_API_KEY}"
          if [ -z "$RESOLVED_KEY" ]; then
            echo "Missing model provider key. Configure DRS_PROVIDER_API_KEY."
            exit 1
          fi
          echo "OPENCODE_API_KEY=$RESOLVED_KEY" >> "$GITHUB_ENV"

      - name: Run stacked guidance workflow
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRS_RUNTIME_OPERATION_TIMEOUT_MS: "300000"
          DRS_RUNTIME_STREAM_TIMEOUT_MS: "900000"
          DRS_RUNTIME_STREAM_POLL_INTERVAL_MS: "2000"
        run: |
          node dist/cli/index.js workflow run github-pr-update-agents-md-stacked \
            --input owner="${{ github.event.repository.owner.login }}" \
            --input repo="${{ github.event.repository.name }}" \
            --input pr="${{ inputs.pr }}" \
            --input paths="${{ inputs.paths }}"
