name: DRS Stacked Review Fix

on:
  workflow_dispatch:
    inputs:
      pr:
        description: Source pull request number
        required: true
      severity:
        description: Minimum severity to fix
        required: false
        default: high
      minIssues:
        description: Minimum matching issue count
        required: false
        default: "1"

permissions:
  contents: write
  pull-requests: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Checkout source PR head
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr checkout "${{ inputs.pr }}"

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22.19.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build DRS
        run: npm run build

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Resolve model provider key
        env:
          DRS_PROVIDER_API_KEY: ${{ secrets.DRS_PROVIDER_API_KEY }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          RESOLVED_KEY="${DRS_PROVIDER_API_KEY:-$OPENCODE_API_KEY}"
          if [ -z "$RESOLVED_KEY" ]; then
            echo "Missing model provider key. Configure DRS_PROVIDER_API_KEY."
            exit 1
          fi
          echo "OPENCODE_API_KEY=$RESOLVED_KEY" >> "$GITHUB_ENV"

      - name: Run stacked fix workflow
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRS_RUNTIME_OPERATION_TIMEOUT_MS: "300000"
          DRS_RUNTIME_STREAM_TIMEOUT_MS: "900000"
          DRS_RUNTIME_STREAM_POLL_INTERVAL_MS: "2000"
        run: |
          node dist/cli/index.js workflow run github-pr-fix-review-issues-stacked \
            --input owner="${{ github.event.repository.owner.login }}" \
            --input repo="${{ github.event.repository.name }}" \
            --input pr="${{ inputs.pr }}" \
            --input severity="${{ inputs.severity }}" \
            --input minIssues="${{ inputs.minIssues }}"
