name: Update Repository Wiki

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

concurrency:
  group: repository-wiki-update
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      baseline-sha: ${{ steps.baseline.outputs.sha }}
      changed: ${{ steps.wiki-changes.outputs.changed }}

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          persist-credentials: false

      - name: Record default-branch baseline
        id: baseline
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22.19.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build DRS
        run: npm run build

      - name: Synchronize repository wiki
        env:
          DRS_PROVIDER_API_KEY: ${{ secrets.DRS_PROVIDER_API_KEY }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          DRS_RUNTIME_OPERATION_TIMEOUT_MS: '300000'
          DRS_RUNTIME_STREAM_TIMEOUT_MS: '900000'
          DRS_RUNTIME_STREAM_POLL_INTERVAL_MS: '2000'
        run: |
          set -euo pipefail
          resolved_key="${DRS_PROVIDER_API_KEY:-$OPENCODE_API_KEY}"
          if [ -z "$resolved_key" ]; then
            echo "Missing DRS_PROVIDER_API_KEY or OPENCODE_API_KEY"
            exit 1
          fi

          export OPENCODE_API_KEY="$resolved_key"
          artifact_dir="$RUNNER_TEMP/repository-wiki-artifacts"
          result_path="$RUNNER_TEMP/repository-wiki-result.json"
          mkdir -p "$artifact_dir"
          node dist/cli/index.js workflow run repository-wiki-sync \
            --executor local \
            --json | tee "$result_path"
          jq -er '.output.summaryMarkdown' "$result_path" \
            > "$artifact_dir/repository-wiki-summary.md"
          rm "$result_path"

      - name: Report repository wiki summary
        shell: bash
        run: |
          set -euo pipefail
          cat "$RUNNER_TEMP/repository-wiki-artifacts/repository-wiki-summary.md" \
            >> "$GITHUB_STEP_SUMMARY"

      - name: Guard wiki-only changes
        id: wiki-changes
        shell: bash
        env:
          BASELINE_SHA: ${{ steps.baseline.outputs.sha }}
        run: |
          set -euo pipefail
          unexpected=false

          if [ "$(git rev-parse HEAD)" != "$BASELINE_SHA" ]; then
            echo "Repository wiki generation must not create commits"
            exit 1
          fi

          while IFS= read -r -d '' path; do
            case "$path" in
              wiki/*|.drs/wiki-state.json) ;;
              *)
                printf 'Unexpected modified path: %q\n' "$path"
                unexpected=true
                ;;
            esac
          done < <(git diff --name-only --no-renames -z "$BASELINE_SHA")

          while IFS= read -r -d '' path; do
            case "$path" in
              wiki/*|.drs/wiki-state.json) ;;
              *)
                printf 'Unexpected untracked path: %q\n' "$path"
                unexpected=true
                ;;
            esac
          done < <(git ls-files --others --exclude-standard -z)

          if [ "$unexpected" = true ]; then
            exit 1
          fi

          git add -A -- wiki .drs/wiki-state.json
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Repository wiki is already current"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --cached --check
            patch_path="$RUNNER_TEMP/repository-wiki-artifacts/repository-wiki.patch"
            rm -f "$patch_path"
            git diff --cached --binary --full-index > "$patch_path"
          fi

      - name: Upload repository wiki artifacts
        uses: actions/upload-artifact@v4
        with:
          name: repository-wiki-patch-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/repository-wiki-artifacts
          if-no-files-found: error
          retention-days: 1

  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: generate
    permissions:
      contents: read

    steps:
      - name: Checkout verified baseline
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.generate.outputs.baseline-sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Download repository wiki artifacts
        uses: actions/download-artifact@v4
        with:
          name: repository-wiki-patch-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/repository-wiki-patch

      - name: Apply and verify repository wiki patch
        if: needs.generate.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git apply --index --binary "$RUNNER_TEMP/repository-wiki-patch/repository-wiki.patch"
          unexpected=false

          while IFS= read -r -d '' path; do
            case "$path" in
              wiki/*|.drs/wiki-state.json) ;;
              *)
                printf 'Unexpected patched path: %q\n' "$path"
                unexpected=true
                ;;
            esac
          done < <(git diff --cached --name-only --no-renames -z)

          while IFS= read -r -d '' entry; do
            case "$entry" in
              120000\ *)
                printf 'Symbolic links are not allowed in the repository wiki patch: %q\n' "$entry"
                unexpected=true
                ;;
            esac
          done < <(git ls-files --stage -z -- wiki .drs/wiki-state.json)

          if [ "$unexpected" = true ] || git diff --cached --quiet; then
            exit 1
          fi

          git diff --cached --check

      - name: Create or update repository wiki pull request
        id: wiki-pr
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          token: ${{ secrets.DRS_WIKI_SYNC_TOKEN }}
          base: ${{ github.event.repository.default_branch }}
          branch: drs/wiki-update
          delete-branch: true
          add-paths: |
            wiki
            .drs/wiki-state.json
          commit-message: 'docs(wiki): synchronize repository wiki'
          title: 'docs(wiki): synchronize repository wiki'
          body-path: ${{ runner.temp }}/repository-wiki-patch/repository-wiki-summary.md

      - name: Report pull request
        if: steps.wiki-pr.outputs.pull-request-url != ''
        run: echo "Repository wiki pull request:${{ steps.wiki-pr.outputs.pull-request-url }}" >> "$GITHUB_STEP_SUMMARY"
