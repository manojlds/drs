name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '**'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22, 24]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check code formatting
        run: npm run format:check

      - name: Run TypeScript type checking
        run: npm run type-check

      - name: Run linter
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Check scheduled repository wiki freshness
        if: >-
          github.event_name == 'pull_request' &&
          github.head_ref == 'drs/wiki-update' &&
          github.event.pull_request.head.repo.full_name == github.repository
        run: node dist/cli/index.js workflow run repository-wiki-check --executor local --json

      - name: Build repository wiki site
        run: npm run wiki:site:build

      - name: Check package can be packed
        run: npm pack --dry-run
