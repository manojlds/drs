name: Prepare release changelog

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version without leading v, for example 4.0.0'
        required: true
      from:
        description: 'Base ref or previous release tag'
        required: true
        default: 'v3.3.1'
      to:
        description: 'Release commit/ref to summarize'
        required: true
        default: 'HEAD'
      releaseDate:
        description: 'Release date YYYY-MM-DD; defaults to today UTC'
        required: false
      createTag:
        description: 'Create and push v<version> after committing changelog'
        type: boolean
        required: true
        default: false

permissions:
  contents: write

jobs:
  changelog:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout default branch with tags
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22.19.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build DRS
        run: npm run build

      - name: Resolve release date
        id: release-date
        run: |
          RELEASE_DATE="${{ inputs.releaseDate }}"
          if [ -z "$RELEASE_DATE" ]; then
            RELEASE_DATE="$(date -u +%F)"
          fi
          echo "date=$RELEASE_DATE" >> "$GITHUB_OUTPUT"

      - name: Resolve model provider key
        env:
          DRS_PROVIDER_API_KEY: ${{ secrets.DRS_PROVIDER_API_KEY }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          RESOLVED_KEY="${DRS_PROVIDER_API_KEY:-$OPENCODE_API_KEY}"
          if [ -z "$RESOLVED_KEY" ]; then
            echo "Missing model provider key. Configure DRS_PROVIDER_API_KEY or OPENCODE_API_KEY."
            exit 1
          fi
          echo "OPENCODE_API_KEY=$RESOLVED_KEY" >> "$GITHUB_ENV"

      - name: Finalize changelog
        env:
          DRS_DEFAULT_MODEL: opencode-go/kimi-k2.7-code
          DRS_RUNTIME_OPERATION_TIMEOUT_MS: '300000'
          DRS_RUNTIME_STREAM_TIMEOUT_MS: '900000'
          DRS_RUNTIME_STREAM_POLL_INTERVAL_MS: '2000'
        run: |
          node dist/cli/index.js workflow run release-changelog-finalize \
            --input from="${{ inputs.from }}" \
            --input to="${{ inputs.to }}" \
            --input version="${{ inputs.version }}" \
            --input date="${{ steps.release-date.outputs.date }}"

      - name: Commit changelog update
        run: |
          if git diff --quiet -- CHANGELOG.md; then
            echo "No changelog update needed"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs: finalize changelog for v${{ inputs.version }}"
          git push origin HEAD:${{ github.event.repository.default_branch }}

      - name: Create release tag
        if: ${{ inputs.createTag }}
        run: |
          TAG="v${{ inputs.version }}"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists on origin"
            exit 1
          fi

          git tag "$TAG"
          git push origin "$TAG"
