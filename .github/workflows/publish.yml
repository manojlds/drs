name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.0)'
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for npm provenance and trusted publishing (OIDC)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine version and npm tag from git tag
        id: release
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            # GITHUB_REF_NAME is the pushed tag, e.g. v4.0.0-rc.3
            VERSION="${GITHUB_REF_NAME#v}"
          fi

          if echo "$VERSION" | grep -qE '(alpha|beta|rc|pre)'; then
            NPM_TAG="next"
          else
            NPM_TAG="latest"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$NPM_TAG" >> "$GITHUB_OUTPUT"
          echo "Publishing version $VERSION with npm tag $NPM_TAG"

      - name: Update package.json version from tag
        run: |
          node <<'NODE'
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.version = '${{ steps.release.outputs.version }}';
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          NODE

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public --tag ${{ steps.release.outputs.tag }}
        # Uses OIDC trusted publishing - no NODE_AUTH_TOKEN needed
