name: local-changelog-review
description: Update CHANGELOG.md for local changes, then review the final diff
nodes:
  change:
    action: change-source
    with:
      type: local
      staged: false
    output: change

  update-changelog:
    agent: task/changelog-updater
    needs:
      - change
    input: |
      Update CHANGELOG.md for these local changes.

      Read CHANGELOG.md yourself and edit it in place.
      Do not return the full changelog content.

      Local change source:
      {{artifacts.change}}
    output: changelog

  final-change:
    action: change-source
    needs:
      - update-changelog
    with:
      type: local
      staged: false
    output: finalChange

  review:
    action: review
    needs:
      - final-change
    with:
      source: finalChange
    output: review

  commit-changelog:
    action: git-commit
    needs:
      - review
    with:
      paths: CHANGELOG.md
      message: "docs: update changelog"
    output: changelogCommit
