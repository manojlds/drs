# DRS Configuration
# Generated by: drs init
# Documentation: https://github.com/manojlds/drs

pi:
  provider:
    opencode-go:
      apiKey: "OPENCODE_API_KEY"
      api: "openai-completions"
      baseUrl: "https://opencode.ai/zen/go/v1"
      models:
        - id: "kimi-k2.7-code"
          name: "Kimi K2.7 Code"
          reasoning: true
          input: ["text", "image"]
          contextWindow: 262144
          maxTokens: 262144
          cost:
            input: 0.95
            output: 4
            cacheRead: 0.19
            cacheWrite: 0
          compat:
            maxTokensField: "max_tokens"

agents:
  # Default model and skills for all agents (required)
  # For built-in providers: anthropic/claude-sonnet-4-5-20250929, openai/gpt-4o, zhipuai/glm-4.7
  # For custom providers: provider-name/model-name
  default:
    model: opencode-go/glm-5.1
    skills:
      - cli-testing
  namespaces:
    review:
      model: opencode-go/kimi-k2.7-code

workflow:
  # Default workflow used by `drs workflow run` when no workflow name is provided.
  default: local-changelog-review

review:

  # Review agents (execution order)
  # Use fully qualified agent ids. Include review/unified-reviewer when you want a broad one-pass reviewer.
  # Simple format (uses default model):
  agents:
    - review/unified-reviewer
    - review/security
    - review/quality
    - review/style
    - review/performance
    - review/documentation

  # OR detailed format with per-agent model overrides:
  # agents:
  #   - name: review/security
  #     model: anthropic/claude-opus-4-5-20251101  # Premium model for security
  #   - review/quality                              # Uses agents.default.model
  #   - name: review/style
  #     model: openai/gpt-4o                       # Different model for style
  #   - review/performance                          # Uses agents.default.model

  # Files to ignore during review
  ignorePatterns:
    - "*.test.ts"
    - "*.spec.ts"
    - "**/__tests__/**"
    - "**/__mocks__/**"
    - "package-lock.json"
    - "yarn.lock"
    - "pnpm-lock.yaml"

  # Auto-generate a description during review-mr/review-pr
  # CLI overrides:
  #   --describe / --skip-describe
  #   --post-description / --skip-post-description
  describe:
    enabled: true
    postDescription: true

  # Optional: add "Fix in Cursor" deeplinks to posted review comments
  cursorFixLinks:
    enabled: true
    workspace: drs

# PR/MR Description Generator
describe:
  # Model to use for description generation (optional, defaults to agents.default.model)
  # Used by describe-mr/describe-pr and by review-mr/review-pr when enabled.
  model: opencode-go/kimi-k2.7-code
  # Include .drs/context.md content in describe agent instructions
  includeProjectContext: true

# Optional per-model pricing overrides (USD per 1M tokens)
# Applied when runtime cost is missing/zero for a model.
# pricing:
#   models:
#     opencode/glm-5-free:
#       input: 0.00
#       output: 0.00
#       cacheRead: 0.00
#       cacheWrite: 0.00

# Context compression (diff size management)
contextCompression:
  enabled: true
  # Dynamic budget = thresholdPercent × model context window
  # Example: 0.15 = 15% of context window
  thresholdPercent: 0.15
  # Fallback cap when context window metadata is unavailable
  maxTokens: 32000
  softBufferTokens: 1500
  hardBufferTokens: 1000
  tokenEstimateDivisor: 4
