pi:
  provider:
    opencode-go:
      apiKey: "OPENCODE_API_KEY"
      api: "openai-completions"
      baseUrl: "https://opencode.ai/zen/go/v1"
      models:
        - id: "kimi-k2.7-code"
          name: "Kimi K2.7 Code"
          reasoning: true
          input: ["text", "image"]
          contextWindow: 262144
          maxTokens: 262144
          cost:
            input: 0.95
            output: 4
            cacheRead: 0.19
            cacheWrite: 0
          compat:
            maxTokensField: "max_tokens"

agents:
  default:
    model: opencode-go/glm-5.1
    skills:
      - cli-testing
  namespaces:
    review:
      model: opencode-go/kimi-k2.7-code
    visual:
      model: opencode-go/kimi-k2.7-code

workflow:
  default: local-changelog-review

review:
  agents:
    - review/unified-reviewer
  ignorePatterns:
    - "*.test.ts"
    - "*.spec.ts"
    - "**/__tests__/**"
    - "**/__mocks__/**"
    - "package-lock.json"
    - "yarn.lock"
    - "pnpm-lock.yaml"

describe:
  model: opencode-go/kimi-k2.7-code
  includeProjectContext: true

contextCompression:
  enabled: true
  thresholdPercent: 0.15
  maxTokens: 32000
  softBufferTokens: 1500
  hardBufferTokens: 1000
  tokenEstimateDivisor: 4
