name: github-pr-describe
description: Generate a GitHub pull request description, optionally posting it
inputs:
  owner: ""
  repo: ""
  pr: ""
  post: "false"
output: description
nodes:
  change:
    action: change-source
    with:
      type: github-pr
      owner: "{{inputs.owner}}"
      repo: "{{inputs.repo}}"
      pr: "{{inputs.pr}}"
    output: change

  describe:
    action: describe
    needs:
      - change
    with:
      source: change
      post: "{{inputs.post}}"
    output: description
