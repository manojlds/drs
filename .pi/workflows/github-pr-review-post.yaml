name: github-pr-review-post
description: Validate and post a canonical DRS review artifact to a GitHub pull request
metadata:
  kind: review-post
  tags: [review, github, pull-request, artifact]
inputs:
  owner:
    type: string
    required: true
    description: GitHub repository owner
  repo:
    type: string
    required: true
    description: GitHub repository name
  pr:
    type: number
    required: true
    description: Pull request number
  expectedHeadSha:
    type: string
    required: true
    description: Pull request head SHA reviewed by the producing job
output: postedReview
nodes:
  change:
    action: change-source
    with:
      type: github-pr
      owner: '{{inputs.owner}}'
      repo: '{{inputs.repo}}'
      pr: '{{inputs.pr}}'
      requireCompleteDiff: true
    output: change

  load-review:
    action: load-artifact
    needs:
      - change
    with:
      kind: review
      source: change
    output: reviewArtifact

  post-comments:
    action: post-review-comments
    needs:
      - load-review
    with:
      source: change
      review: reviewArtifact
      expectedHeadSha: '{{inputs.expectedHeadSha}}'
    output: postedReview
