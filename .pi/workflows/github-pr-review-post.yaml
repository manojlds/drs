name: github-pr-review-post
description: Review a GitHub pull request and post DRS comments
inputs:
  owner: ""
  repo: ""
  pr: ""
  post: "true"
output: review
nodes:
  change:
    action: change-source
    with:
      type: github-pr
      owner: "{{inputs.owner}}"
      repo: "{{inputs.repo}}"
      pr: "{{inputs.pr}}"
    output: change

  review:
    action: review
    needs:
      - change
    with:
      source: change
    output: review

  post-comments:
    action: post-review-comments
    needs:
      - review
    with:
      source: change
      review: review
    output: postedReview
