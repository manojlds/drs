name: github-pr-review-post
description: Describe and review a GitHub pull request, posting the description and DRS comments
inputs:
  owner: ""
  repo: ""
  pr: ""
output: review
nodes:
  change:
    action: change-source
    with:
      type: github-pr
      owner: "{{inputs.owner}}"
      repo: "{{inputs.repo}}"
      pr: "{{inputs.pr}}"
    output: change

  describe:
    action: describe
    needs:
      - change
    with:
      source: change
      post: true
    output: description

  review:
    action: review
    needs:
      - describe
    with:
      source: change
    output: review

  post-comments:
    action: post-review-comments
    needs:
      - review
    with:
      source: change
      review: review
    output: postedReview
