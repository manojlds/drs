name: gitlab-mr-review
description: Review a GitLab merge request
inputs:
  project: ""
  mr: ""
nodes:
  change:
    action: change-source
    with:
      type: gitlab-mr
      project: "{{inputs.project}}"
      mr: "{{inputs.mr}}"
    output: change

  review:
    action: review
    needs:
      - change
    with:
      source: change
    output: review
