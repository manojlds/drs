name: gitlab-mr-review
description: Review a GitLab merge request, optionally posting a description, DRS comments, and Code Quality
inputs:
  project: ""
  mr: ""
  describe: "false"
  post: "false"
  codeQuality: "false"
  codeQualityReport: gl-code-quality-report.json
output: review
nodes:
  change:
    action: change-source
    with:
      type: gitlab-mr
      project: "{{inputs.project}}"
      mr: "{{inputs.mr}}"
    output: change

  should-describe:
    control: condition
    needs:
      - change
    if: "{{inputs.describe}} == true"
    then: describe
    else: review

  describe:
    action: describe
    with:
      source: change
      post: true
    output: description

  continue-review:
    control: condition
    needs:
      - describe
    if: true
    then: review
    else: review

  review:
    action: review
    with:
      source: change
    output: review

  should-post:
    control: condition
    needs:
      - review
    if: "{{inputs.post}} == true"
    then: post-comments
    else: should-code-quality

  post-comments:
    action: post-review-comments
    with:
      source: change
      review: review
    output: postedReview

  should-code-quality:
    control: condition
    needs:
      - review
    if: "{{inputs.codeQuality}} == true"
    then: code-quality
    else: done

  code-quality:
    action: code-quality-report
    with:
      review: review
      path: "{{inputs.codeQualityReport}}"
    output: codeQualityReport

  done:
    control: end
