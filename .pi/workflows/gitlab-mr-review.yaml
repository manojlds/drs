name: gitlab-mr-review
description: Review a GitLab merge request, optionally posting a description, DRS comments, Code Quality, and a visual HTML explainer
inputs:
  project: ""
  mr: ""
  describe: "false"
  post: "false"
  visual: "false"
  visualOutputPath: ".drs/visual-mr-explainer.html"
  codeQuality: "false"
  codeQualityReport: gl-code-quality-report.json
output: review
nodes:
  change:
    action: change-source
    with:
      type: gitlab-mr
      project: "{{inputs.project}}"
      mr: "{{inputs.mr}}"
    output: change

  should-describe:
    control: condition
    needs:
      - change
    if: "{{inputs.describe}} == true"
    then: describe
    else: review

  describe:
    action: describe
    needs:
      - change
    with:
      source: change
      post: true
    output: description

  continue-visual:
    control: condition
    needs:
      - describe
    if: "true"
    then: review
    else: review

  review:
    action: review
    needs:
      - change
    with:
      source: change
    output: review

  review-artifact:
    action: create-review-artifact
    needs:
      - review
    with:
      source: change
      review: review
    output: reviewArtifact

  save-review-artifact:
    action: save-artifact
    needs:
      - review-artifact
    with:
      kind: review
      source: change
      artifact: reviewArtifact
    output: persistedReviewArtifact

  should-visual:
    control: condition
    needs:
      - save-review-artifact
    if: "{{inputs.visual}} == true"
    then: visual
    else: should-post

  visual:
    agent: visual/pr-explainer
    needs:
      - change
      - review
    input: |
      Generate a visual MR explainer HTML artifact.

      Output path: {{inputs.visualOutputPath}}
      Slide mode: false

      Use the supplied DRS change-source context. If important file diffs are omitted or summarized, use git_diff for those files before explaining them.

      DRS change-source context:
      {{artifacts.change}}

      DRS review result:
      {{artifacts.review}}
    writes: "{{inputs.visualOutputPath}}"
    output: visualExplainer

  continue-review:
    control: condition
    needs:
      - visual
    if: "true"
    then: should-post
    else: should-post

  should-post:
    control: condition
    needs:
      - review
    if: "{{inputs.post}} == true"
    then: post-comments
    else: should-code-quality

  post-comments:
    action: post-review-comments
    needs:
      - review
    with:
      source: change
      review: review
    output: postedReview

  should-code-quality:
    control: condition
    needs:
      - review
    if: "{{inputs.codeQuality}} == true"
    then: code-quality
    else: done

  code-quality:
    action: code-quality-report
    needs:
      - review
    with:
      review: review
      path: "{{inputs.codeQualityReport}}"
    output: codeQualityReport

  done:
    control: end
