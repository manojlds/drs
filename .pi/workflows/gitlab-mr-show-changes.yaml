name: gitlab-mr-show-changes
description: Show the review context for a GitLab merge request
inputs:
  project: ""
  mr: ""
  file: ""
nodes:
  change:
    action: change-source
    with:
      type: gitlab-mr
      project: "{{inputs.project}}"
      mr: "{{inputs.mr}}"
    output: change

  context:
    action: review-context
    needs:
      - change
    with:
      source: change
      file: "{{inputs.file}}"
    output: reviewContext
