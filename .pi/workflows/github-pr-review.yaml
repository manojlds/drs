name: github-pr-review
description: Review a GitHub pull request
inputs:
  owner: ""
  repo: ""
  pr: ""
nodes:
  change:
    action: change-source
    with:
      type: github-pr
      owner: "{{inputs.owner}}"
      repo: "{{inputs.repo}}"
      pr: "{{inputs.pr}}"
    output: change

  review:
    action: review
    needs:
      - change
    with:
      source: change
    output: review
