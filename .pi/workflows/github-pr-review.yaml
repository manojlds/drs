name: github-pr-review
description: Review a GitHub pull request, optionally posting a description, DRS comments, a visual HTML explainer, and a stacked fix PR
inputs:
  owner: ''
  repo: ''
  pr: ''
  describe: 'false'
  post: 'false'
  visual: 'false'
  fix: 'false'
  fixMode: 'stacked'
  fixSeverity: 'high'
  fixMinIssues: '1'
  fixBranchPrefix: 'drs-fix/pr-'
  fixCreateChangeRequest: 'false'
  fixMaxIterations: '3'
  allowStackedSource: 'false'
  fixDraft: 'false'
  visualOutputPath: '.drs/visual-pr-explainer.html'
output: review
nodes:
  change:
    action: change-source
    with:
      type: github-pr
      owner: '{{inputs.owner}}'
      repo: '{{inputs.repo}}'
      pr: '{{inputs.pr}}'
    output: change

  describe:
    action: describe
    needs:
      - change
    if: '{{inputs.describe}} == true'
    with:
      source: change
      post: true
    output: description

  review:
    action: review
    needs:
      - change
    with:
      source: change
    output: review

  review-artifact:
    action: create-review-artifact
    needs:
      - review
    with:
      source: change
      review: review
    output: reviewArtifact

  save-review-artifact:
    action: save-artifact
    needs:
      - review-artifact
    with:
      kind: review
      source: change
      artifact: reviewArtifact
    output: persistedReviewArtifact

  visual:
    agent: visual/pr-explainer
    needs:
      - change
      - review
      - save-review-artifact
    if: '{{inputs.visual}} == true'
    input: |
      Generate a visual PR explainer HTML artifact.

      Output path: {{inputs.visualOutputPath}}
      Slide mode: false

      Use the supplied DRS change-source context. If important file diffs are omitted or summarized, use git_diff for those files before explaining them.

      DRS change-source context:
      {{artifacts.change}}

      DRS review result:
      {{artifacts.review}}
    writes: '{{inputs.visualOutputPath}}'
    output: visualExplainer

  post-comments:
    action: post-review-comments
    needs:
      - review
    if: '{{inputs.post}} == true'
    with:
      source: change
      review: review
    output: postedReview

  stack-guard:
    action: stack-guard
    needs:
      - change
      - save-review-artifact
    if: '{{inputs.fix}} == true'
    with:
      source: change
      allowStackedSource: '{{inputs.allowStackedSource}}'
    output: stackGuard

  fix-threshold:
    action: review-threshold
    needs:
      - review
      - stack-guard
    if: '{{artifacts.stackGuard.allowed}} == true'
    with:
      review: review
      severity: '{{inputs.fixSeverity}}'
      minIssues: '{{inputs.fixMinIssues}}'
    output: reviewThreshold

  fix-branch:
    action: git-branch
    needs:
      - fix-threshold
    if: '{{artifacts.reviewThreshold.matched}} == true'
    with:
      name: '{{inputs.fixBranchPrefix}}{{inputs.pr}}'
      force: true
    output: fixBranch

  fix-issues:
    agent: task/review-issue-fixer
    needs:
      - fix-branch
      - review-artifact
    input: |
      Fix actionable issues from this DRS review artifact for GitHub PR #{{inputs.pr}}.

      Only fix findings at or above severity {{inputs.fixSeverity}} unless a lower-severity issue is directly required by such a fix.

      Review artifact:
      {{artifacts.reviewArtifact}}

      Persisted artifact envelope:
      {{artifacts.persistedReviewArtifact}}

      Current PR change source:
      {{artifacts.change}}
    output: fixes

  stage-fixes:
    action: git-add
    needs:
      - fix-issues
    if: '{{inputs.fixMode}} == internal'
    with:
      paths: '.'
    output: stagedFixes

  fix-change:
    action: change-source
    needs:
      - stage-fixes
    with:
      type: local
      staged: true
    output: fixChange

  verification-change:
    action: change-source
    needs:
      - fix-change
    with:
      type: fix-verification
      source: change
      fixChange: fixChange
    output: verificationChange

  re-review:
    action: review
    needs:
      - verification-change
    with:
      source: verificationChange
      reviewArtifact: persistedReviewArtifact
      severity: '{{inputs.fixSeverity}}'
    output: reReview

  verify-fix:
    action: verify-fix
    needs:
      - re-review
      - save-review-artifact
      - fix-change
    with:
      artifact: persistedReviewArtifact
      review: reReview
      fixChange: fixChange
      severity: '{{inputs.fixSeverity}}'
      minIssues: '1'
    output: persistedReviewArtifact

  fix-loop:
    control: loop
    needs:
      - verify-fix
    condition: '{{artifacts.verify-fix.shouldContinue}} == true'
    target: fix-issues
    exit: post-fix-status-internal
    maxIterations: '{{inputs.fixMaxIterations}}'
    onMaxIterations: exit

  post-fix-status-internal:
    action: post-fix-status
    needs:
      - verify-fix
    if: '{{inputs.fixMode}} == internal'
    with:
      platform: github
      owner: '{{inputs.owner}}'
      repo: '{{inputs.repo}}'
      pr: '{{inputs.pr}}'
      source: change
      reviewArtifact: persistedReviewArtifact
      fixReview: reReview
      fixChange: fixChange
      severity: '{{inputs.fixSeverity}}'
      marker: drs-fix-status
    output: fixStatus

  commit-internal-fix:
    action: git-commit
    needs:
      - post-fix-status-internal
    if: '{{artifacts.verify-fix.shouldContinue}} == false && {{artifacts.verify-fix.fixFiles}} > 0'
    with:
      message: 'fix: address DRS review issues for PR #{{inputs.pr}}'
      paths: '.'
    output: internalFixCommit

  push-internal-fix:
    action: git-push
    needs:
      - commit-internal-fix
    with:
      branch: HEAD
      remoteBranch: '{{artifacts.change.context.pullRequest.sourceBranch}}'
      setUpstream: false
    output: internalFixPush

  mark-fix-attempted:
    action: review-artifact-update-findings
    needs:
      - fix-issues
    if: '{{inputs.fixMode}} != internal'
    with:
      artifact: persistedReviewArtifact
      severity: '{{inputs.fixSeverity}}'
      state: attempted
      disposition: partial
    output: persistedReviewArtifact

  fix-diff:
    action: has-diff
    needs:
      - mark-fix-attempted
    output: fixDiff

  fix-commit:
    action: git-commit
    needs:
      - fix-diff
    if: '{{artifacts.fixDiff.changed}} == true && {{inputs.fixCreateChangeRequest}} == true'
    with:
      message: 'fix: address DRS review issues for PR #{{inputs.pr}}'
      paths: '.'
    output: fixCommit

  fix-push:
    action: git-push
    needs:
      - fix-commit
    with:
      branch: '{{inputs.fixBranchPrefix}}{{inputs.pr}}'
    output: fixPush

  create-fix-pr:
    action: create-change-request
    needs:
      - fix-push
    with:
      platform: github
      owner: '{{inputs.owner}}'
      repo: '{{inputs.repo}}'
      sourceBranch: '{{inputs.fixBranchPrefix}}{{inputs.pr}}'
      targetBranch: '{{artifacts.change.context.pullRequest.sourceBranch}}'
      title: 'fix: address DRS review issues for PR #{{inputs.pr}}'
      draft: '{{inputs.fixDraft}}'
      body: |
        Automated DRS fix stacked on PR #{{inputs.pr}} from the main github-pr-review workflow.

        Threshold: {{inputs.fixSeverity}}, minimum issues: {{inputs.fixMinIssues}}
        Review artifact: {{artifacts.persistedReviewArtifact.path}}

        <!-- drs-stack-source: github:{{inputs.owner}}/{{inputs.repo}}#{{inputs.pr}} -->
        <!-- drs-stack-kind: fix -->
    output: changeRequest

  notify-fix-pr:
    action: post-comment
    needs:
      - create-fix-pr
    with:
      platform: github
      owner: '{{inputs.owner}}'
      repo: '{{inputs.repo}}'
      pr: '{{inputs.pr}}'
      marker: drs-stacked-fix-notification
    input: |
      🔧 DRS created a stacked fix PR: {{artifacts.changeRequest.url}}

      The fix addresses {{inputs.fixSeverity}}-priority review findings from this PR's review run.

      <!-- drs-stacked-fix-notification -->

  post-fix-status-stacked:
    action: post-fix-status
    needs:
      - create-fix-pr
      - save-review-artifact
    with:
      platform: github
      owner: '{{inputs.owner}}'
      repo: '{{inputs.repo}}'
      pr: '{{inputs.pr}}'
      source: change
      reviewArtifact: persistedReviewArtifact
      severity: '{{inputs.fixSeverity}}'
      stackedPrUrl: '{{artifacts.changeRequest.url}}'
      marker: drs-fix-status
    output: fixStatus

  done:
    control: end
