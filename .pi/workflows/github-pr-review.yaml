name: github-pr-review
description: Review a GitHub pull request, optionally posting a description, DRS comments, a visual HTML explainer, and a stacked fix PR
inputs:
  owner: ""
  repo: ""
  pr: ""
  describe: "false"
  post: "false"
  visual: "false"
  fix: "false"
  fixSeverity: "high"
  fixMinIssues: "1"
  fixBranchPrefix: "drs-fix/pr-"
  allowStackedSource: "false"
  fixDraft: "false"
  visualOutputPath: ".drs/visual-pr-explainer.html"
output: review
nodes:
  change:
    action: change-source
    with:
      type: github-pr
      owner: "{{inputs.owner}}"
      repo: "{{inputs.repo}}"
      pr: "{{inputs.pr}}"
    output: change

  should-describe:
    control: condition
    needs:
      - change
    if: "{{inputs.describe}} == true"
    then: describe
    else: review

  describe:
    action: describe
    needs:
      - change
    with:
      source: change
      post: true
    output: description

  continue-visual:
    control: condition
    needs:
      - describe
    if: "true"
    then: review
    else: review

  review:
    action: review
    needs:
      - change
    with:
      source: change
    output: review

  review-artifact:
    action: create-review-artifact
    needs:
      - review
    with:
      source: change
      review: review
    output: reviewArtifact

  save-review-artifact:
    action: save-artifact
    needs:
      - review-artifact
    with:
      kind: review
      source: change
      artifact: reviewArtifact
    output: persistedReviewArtifact

  should-visual:
    control: condition
    needs:
      - save-review-artifact
    if: "{{inputs.visual}} == true"
    then: visual
    else: should-post

  visual:
    agent: visual/pr-explainer
    needs:
      - change
      - review
    input: |
      Generate a visual PR explainer HTML artifact.

      Output path: {{inputs.visualOutputPath}}
      Slide mode: false

      Use the supplied DRS change-source context. If important file diffs are omitted or summarized, use git_diff for those files before explaining them.

      DRS change-source context:
      {{artifacts.change}}

      DRS review result:
      {{artifacts.review}}
    writes: "{{inputs.visualOutputPath}}"
    output: visualExplainer

  continue-review:
    control: condition
    needs:
      - visual
    if: "true"
    then: should-post
    else: should-post

  should-post:
    control: condition
    needs:
      - review
    if: "{{inputs.post}} == true"
    then: post-comments
    else: should-fix-enabled

  post-comments:
    action: post-review-comments
    needs:
      - review
    with:
      source: change
      review: review
    output: postedReview

  continue-fix:
    control: condition
    needs:
      - post-comments
    if: "true"
    then: should-fix-enabled
    else: should-fix-enabled

  should-fix-enabled:
    control: condition
    needs:
      - save-review-artifact
    if: "{{inputs.fix}} == true"
    then: stack-guard
    else: done

  stack-guard:
    action: stack-guard
    needs:
      - change
    with:
      source: change
      allowStackedSource: "{{inputs.allowStackedSource}}"
    output: stackGuard

  should-stack:
    control: condition
    needs:
      - stack-guard
    if: "{{artifacts.stackGuard.allowed}} == true"
    then: fix-threshold
    else: done

  fix-threshold:
    action: review-threshold
    needs:
      - review
    with:
      review: review
      severity: "{{inputs.fixSeverity}}"
      minIssues: "{{inputs.fixMinIssues}}"
    output: reviewThreshold

  should-fix:
    control: condition
    needs:
      - fix-threshold
    if: "{{artifacts.reviewThreshold.matched}} == true"
    then: fix-branch
    else: done

  fix-branch:
    action: git-branch
    with:
      name: "{{inputs.fixBranchPrefix}}{{inputs.pr}}"
      force: true
    output: fixBranch

  fix-issues:
    agent: task/review-issue-fixer
    needs:
      - fix-branch
      - review-artifact
    input: |
      Fix actionable issues from this DRS review artifact for GitHub PR #{{inputs.pr}}.

      Only fix findings at or above severity {{inputs.fixSeverity}} unless a lower-severity issue is directly required by such a fix.

      Review artifact:
      {{artifacts.reviewArtifact}}

      Persisted artifact envelope:
      {{artifacts.persistedReviewArtifact}}

      Current PR change source:
      {{artifacts.change}}
    output: fixes

  mark-fix-attempted:
    action: review-artifact-update-findings
    needs:
      - fix-issues
    with:
      artifact: persistedReviewArtifact
      minSeverity: "{{inputs.fixSeverity}}"
      state: attempted
      disposition: partial
    output: persistedReviewArtifact

  fix-diff:
    action: has-diff
    needs:
      - mark-fix-attempted
    output: fixDiff

  should-create-fix-pr:
    control: condition
    needs:
      - fix-diff
    if: "{{artifacts.fixDiff.changed}} == true"
    then: fix-commit
    else: done

  fix-commit:
    action: git-commit
    with:
      message: "fix: address DRS review issues for PR #{{inputs.pr}}"
      paths: "."
    output: fixCommit

  fix-push:
    action: git-push
    needs:
      - fix-commit
    with:
      branch: "{{inputs.fixBranchPrefix}}{{inputs.pr}}"
    output: fixPush

  create-fix-pr:
    action: create-change-request
    needs:
      - fix-push
    with:
      platform: github
      owner: "{{inputs.owner}}"
      repo: "{{inputs.repo}}"
      sourceBranch: "{{inputs.fixBranchPrefix}}{{inputs.pr}}"
      targetBranch: "{{artifacts.change.context.pullRequest.sourceBranch}}"
      title: "fix: address DRS review issues for PR #{{inputs.pr}}"
      draft: "{{inputs.fixDraft}}"
      body: |
        Automated DRS fix stacked on PR #{{inputs.pr}} from the main github-pr-review workflow.

        Threshold: {{inputs.fixSeverity}}, minimum issues: {{inputs.fixMinIssues}}
        Review artifact: {{artifacts.persistedReviewArtifact.path}}

        <!-- drs-stack-source: github:{{inputs.owner}}/{{inputs.repo}}#{{inputs.pr}} -->
        <!-- drs-stack-kind: fix -->
    output: changeRequest

  done:
    control: end
