name: gitlab-mr-describe
description: Generate a GitLab merge request description, optionally posting it
inputs:
  project: ""
  mr: ""
  post: "false"
output: description
nodes:
  change:
    action: change-source
    with:
      type: gitlab-mr
      project: "{{inputs.project}}"
      mr: "{{inputs.mr}}"
    output: change

  describe:
    action: describe
    needs:
      - change
    with:
      source: change
      post: "{{inputs.post}}"
    output: description
