name: github-pr-fix-review-issues-stacked
description: Fix high-severity GitHub PR review issues and open a stacked PR
inputs:
  owner: ''
  repo: ''
  pr: ''
  severity: 'high'
  minIssues: '1'
  branchPrefix: 'drs-fix/pr-'
  allowStackedSource: 'false'
  draft: 'false'
output: changeRequest
nodes:
  change:
    action: change-source
    with:
      type: github-pr
      owner: '{{inputs.owner}}'
      repo: '{{inputs.repo}}'
      pr: '{{inputs.pr}}'
    output: change

  guard:
    action: stack-guard
    needs:
      - change
    with:
      source: change
      allowStackedSource: '{{inputs.allowStackedSource}}'
    output: stackGuard

  review:
    action: review
    needs:
      - change
      - guard
    if: '{{artifacts.stackGuard.allowed}} == true'
    with:
      source: change
    output: review

  review-artifact:
    action: create-review-artifact
    needs:
      - review
    with:
      source: change
      review: review
    output: reviewArtifact

  save-review-artifact:
    action: save-artifact
    needs:
      - review-artifact
    with:
      kind: review
      source: change
      artifact: reviewArtifact
    output: persistedReviewArtifact

  threshold:
    action: review-threshold
    needs:
      - review
    with:
      review: review
      severity: '{{inputs.severity}}'
      minIssues: '{{inputs.minIssues}}'
    output: reviewThreshold

  branch:
    action: git-branch
    needs:
      - threshold
    if: '{{artifacts.reviewThreshold.matched}} == true'
    with:
      name: '{{inputs.branchPrefix}}{{inputs.pr}}'
      force: true
    output: branch

  fix-issues:
    agent: task/review-issue-fixer
    needs:
      - branch
      - review-artifact
    input: |
      Fix actionable issues from this DRS review artifact for GitHub PR #{{inputs.pr}}.

      Only fix findings at or above severity {{inputs.severity}} unless a lower-severity issue is directly required by such a fix.

      Review artifact:
      {{artifacts.reviewArtifact}}

      Persisted artifact envelope:
      {{artifacts.persistedReviewArtifact}}

      Current PR change source:
      {{artifacts.change}}
    output: fixes

  mark-fix-attempted:
    action: review-artifact-update-findings
    needs:
      - fix-issues
    with:
      artifact: persistedReviewArtifact
      severity: '{{inputs.severity}}'
      state: attempted
      disposition: partial
    output: persistedReviewArtifact

  diff:
    action: has-diff
    needs:
      - mark-fix-attempted
    output: fixDiff

  commit:
    action: git-commit
    needs:
      - diff
    if: '{{artifacts.fixDiff.changed}} == true'
    with:
      message: 'fix: address DRS review issues for PR #{{inputs.pr}}'
      paths: '.'
    output: commit

  push:
    action: git-push
    needs:
      - commit
    with:
      branch: '{{inputs.branchPrefix}}{{inputs.pr}}'
    output: push

  create:
    action: create-change-request
    needs:
      - push
    with:
      platform: github
      owner: '{{inputs.owner}}'
      repo: '{{inputs.repo}}'
      sourceBranch: '{{inputs.branchPrefix}}{{inputs.pr}}'
      targetBranch: '{{artifacts.change.context.pullRequest.sourceBranch}}'
      title: 'fix: address DRS review issues for PR #{{inputs.pr}}'
      draft: '{{inputs.draft}}'
      body: |
        Automated DRS fix stacked on PR #{{inputs.pr}}.

        Threshold: {{inputs.severity}}, minimum issues: {{inputs.minIssues}}

        <!-- drs-stack-source: github:{{inputs.owner}}/{{inputs.repo}}#{{inputs.pr}} -->
        <!-- drs-stack-kind: fix -->
    output: changeRequest

  post-fix-status:
    action: post-fix-status
    needs:
      - create
      - save-review-artifact
    with:
      platform: github
      owner: '{{inputs.owner}}'
      repo: '{{inputs.repo}}'
      pr: '{{inputs.pr}}'
      source: change
      reviewArtifact: persistedReviewArtifact
      stackedPrUrl: '{{artifacts.changeRequest.url}}'
      marker: drs-fix-status
    output: fixStatus

  done:
    control: end
