name: gitlab-mr-review-post
description: Review a GitLab merge request and post DRS comments
inputs:
  project: ""
  mr: ""
nodes:
  change:
    action: change-source
    with:
      type: gitlab-mr
      project: "{{inputs.project}}"
      mr: "{{inputs.mr}}"
    output: change

  review:
    action: review
    needs:
      - change
    with:
      source: change
    output: review

  post-comments:
    action: post-review-comments
    needs:
      - review
    with:
      source: change
      review: review
    output: postedReview
