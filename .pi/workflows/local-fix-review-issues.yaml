name: local-fix-review-issues
description: Fix actionable issues from a saved DRS review result
inputs:
  review: ""
nodes:
  change:
    action: change-source
    with:
      type: local
      staged: false
    output: change

  fix-issues:
    agent: task/review-issue-fixer
    needs:
      - change
    input: |
      Fix actionable issues from this DRS review result.

      Review result:
      {{inputs.review}}

      Current local change source:
      {{artifacts.change}}
    output: fixes

  final-change:
    action: change-source
    needs:
      - fix-issues
    with:
      type: local
      staged: false
    output: finalChange

  review:
    action: review
    needs:
      - final-change
    with:
      source: finalChange
    output: review
