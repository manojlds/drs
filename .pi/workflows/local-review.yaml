name: local-review
description: Review local git diff
inputs:
  staged:
    type: boolean
    default: false
    description: Review staged changes instead of unstaged changes
output: review
nodes:
  change:
    action: change-source
    with:
      type: local
      staged: '{{inputs.staged}}'
    output: change

  review:
    action: review
    needs:
      - change
    with:
      source: change
      artifact: persistedReviewArtifact
    output: review
