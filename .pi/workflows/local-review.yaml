name: local-review
description: Review local git diff
inputs:
  staged: "false"
output: review
nodes:
  change:
    action: change-source
    with:
      type: local
      staged: "{{inputs.staged}}"
    output: change

  review:
    action: review
    needs:
      - change
    with:
      source: change
    output: review

  review-artifact:
    action: create-review-artifact
    needs:
      - review
    with:
      source: change
      review: review
    output: reviewArtifact

  save-review-artifact:
    action: save-artifact
    needs:
      - review-artifact
    with:
      kind: review
      source: change
      artifact: reviewArtifact
    output: persistedReviewArtifact
